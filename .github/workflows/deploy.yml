name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main  # <--- 注意：如果你的主分支叫 master，请改成 master

# 授予 GitHub Actions 自动部署的所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保并发部署不会发生冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # 使用最新的 Node 版本，告别之前的警告！
          cache: 'npm'

      - name: Install dependencies
        run: npm install  # <--- 这一步就是用来下载 fluid 主题的！

      - name: Build Hexo
        run: npx hexo generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
